<body class="bg-white dark:bg-gray-900">

    <!-- Hero Section - Moved outside max-width wrapper -->
    <section class="relative h-[20vh] w-full bg-cover bg-center bg-no-repeat" style="background-image: url('assets/artwork.jpg');">

        </div>
    </section>

    <!-- Max-width wrapper -->
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Main Content -->
        <main class="container mx-auto px-4 py-8">

            <section class="mb-20">

                <div class="relative max-w-3xl mx-auto">
                    <div class="carousel-container overflow-hidden">
                        <div class="carousel-track-cats flex transition-transform duration-500">
                            <div class="carousel-slide min-w-full">
                                <div class="aspect-[4/3] w-full max-w-3xl mx-auto">
                                    <img src="assets/images/life/Cats/cat1_orange.jpg" alt="Cat photo 1" class="w-full h-full object-cover">
                                </div>
                            </div>
                            <div class="carousel-slide min-w-full">
                                <div class="aspect-[4/3] w-full max-w-3xl mx-auto">
                                    <img src="assets/images/life/Cats/cat3.jpg" alt="Cat photo 3" class="w-full h-full object-cover">
                                </div>
                            </div>
                            <div class="carousel-slide min-w-full">
                                <div class="aspect-[4/3] w-full max-w-3xl mx-auto">
                                    <img src="assets/images/life/Cats/cat4.jpg" alt="Cat photo 4" class="w-full h-full object-cover">
                                </div>
                            </div>
                            <div class="carousel-slide min-w-full">
                                <div class="aspect-[4/3] w-full max-w-3xl mx-auto">
                                    <img src="assets/images/life/Cats/cat5.jpg" alt="Cat photo 5" class="w-full h-full object-cover">

                        </div>
                    </div>
                    <button class="carousel-prev-cats absolute left-2 top-1/2 -translate-y-1/2 bg-white/50 dark:bg-gray-800/50 p-1.5 hover:bg-white/70 dark:hover:bg-gray-800/70 transition-colors">
                        <i class="ri-arrow-left-s-line text-lg"></i>
                    </button>
                    <button class="carousel-next-cats absolute right-2 top-1/2 -translate-y-1/2 bg-white/50 dark:bg-gray-800/50 p-1.5 hover:bg-white/70 dark:hover:bg-gray-800/70 transition-colors">

            </section>

            <!-- Credits -->
            <div class="mt-8 mb-4 text-right">
                <p class="text-sm text-gray-500 dark:text-gray-400 font-montserrat">
                    Photo credits: Jiacong Fang

            <!-- Quote -->

    <!-- JavaScript -->
    <script>
        // Dark mode toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Carousel functionality
        document.addEventListener('DOMContentLoaded', () => {
            function initializeCarousel(track, slides, prevButton, nextButton) {
                if (!track || !slides || slides.length === 0 || !prevButton || !nextButton) {
                    return;
                }

                let currentIndex = 0;
                const slideCount = slides.length;

                // Clone first and last slides for infinite loop
                const firstSlide = slides[0].cloneNode(true);
                const lastSlide = slides[slideCount - 1].cloneNode(true);
                track.appendChild(firstSlide);
                track.insertBefore(lastSlide, slides[0]);

                // Set initial position
                currentIndex = 1;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                track.style.transition = 'transform 0.5s ease-in-out';

                function updateSlidePosition(animate = true) {
                    track.style.transition = animate ? 'transform 0.5s ease-in-out' : 'none';
                    track.style.transform = `translateX(-${currentIndex * 100}%)`;
                }

                function handleTransitionEnd() {
                    if (currentIndex === 0) {
                        currentIndex = slideCount;
                        updateSlidePosition(false);
                    } else if (currentIndex === slideCount + 1) {
                        currentIndex = 1;
                        updateSlidePosition(false);
                    }
                }

                prevButton.addEventListener('click', () => {
                    currentIndex--;
                    updateSlidePosition();
                });

                nextButton.addEventListener('click', () => {
                    currentIndex++;
                    updateSlidePosition();
                });

                track.addEventListener('transitionend', handleTransitionEnd);
            }

            // Cats carousel
            initializeCarousel(
                document.querySelector('.carousel-track-cats'),
                document.querySelectorAll('.carousel-track-cats .carousel-slide'),
                document.querySelector('.carousel-prev-cats'),
                document.querySelector('.carousel-next-cats')
            );
        });
    </script>
</body>
